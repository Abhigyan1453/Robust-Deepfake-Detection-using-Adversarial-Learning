<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Deepfake Detector</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: linear-gradient(120deg, #1d2b64, #f8cdda);
      min-height: 100vh;
      font-family: 'Segoe UI', sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
      position: relative;
    }

    .blob {
      position: absolute;
      border-radius: 50%;
      filter: blur(100px);
      opacity: 0.6;
      z-index: 0;
    }

    .blob.one {
      width: 400px;
      height: 400px;
      background: #00f2fe;
      top: -100px;
      left: -100px;
      animation: float 20s ease-in-out infinite;
    }

    .blob.two {
      width: 300px;
      height: 300px;
      background: #f7971e;
      bottom: -80px;
      right: -80px;
      animation: float 25s ease-in-out infinite;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0px) rotate(0deg); }
      50% { transform: translateY(20px) rotate(45deg); }
    }

    .card {
      position: relative;
      background: rgba(255, 255, 255, 0.15);
      border-radius: 20px;
      padding: 40px;
      width: 90%;
      max-width: 500px;
      box-shadow: 0 8px 32px 0 rgba( 31, 38, 135, 0.37 );
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border: 1px solid rgba( 255, 255, 255, 0.18 );
      z-index: 2;
      text-align: center;
    }

    .card h2 {
      color: #fff;
      margin-bottom: 25px;
      font-size: 28px;
    }

    .card input[type="file"],
    .card input[type="text"] {
      width: 100%;
      padding: 12px;
      margin: 10px 0;
      border-radius: 10px;
      border: none;
      font-size: 16px;
      outline: none;
    }

    .card input[type="submit"] {
      background: #4CAF50;
      color: white;
      font-size: 16px;
      padding: 12px 25px;
      border: none;
      border-radius: 10px;
      margin-top: 20px;
      cursor: pointer;
      transition: 0.3s ease;
    }

    .card input[type="submit"]:hover {
      background: #45a049;
    }

    .credit {
      margin-top: 20px;
      font-size: 12px;
      color: #eee;
    }
  </style>
</head>
<body>

  <div class="blob one"></div>
  <div class="blob two"></div>

  <div class="card">
    <h2>🎥 Deepfake Detection</h2>

    <form action="/upload" method="post" enctype="multipart/form-data">
      <input type="file" name="video">
      <input type="text" name="video_url" placeholder="Paste YouTube or direct video link">
      <input type="submit" value="Analyze Video">
    </form>
  </div>

</body>
</html>
